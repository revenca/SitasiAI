# nginx SitasiAI — sajikan SPA (React build) + reverse-proxy /api ke backend.
# Satu origin: browser cukup akses http://<server> (port 80), tanpa CORS.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Aset statis React (hash di nama file → boleh cache lama)
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API → container backend. Trailing slash di proxy_pass MEMBUANG prefix /api/
    #   /api/recommend  →  http://api:8000/recommend
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # HyDE (N=5) + CoT bisa 10-60 dtk → timeout longgar
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
        client_max_body_size  5m;
    }

    # SPA fallback: semua rute lain → index.html (react-router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
